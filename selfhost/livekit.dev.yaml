# LiveKit development configuration (narrow UDP port range)
#
# Used by compose.override.yml to avoid host port conflicts on macOS.
# See https://docs.livekit.io/ for details.

port: 7880
log_level: debug

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true

redis:
  address: cache:6379
