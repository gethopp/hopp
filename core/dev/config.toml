[livekit]
url = "ws://localhost:7880"
api_key = "devkey"
api_secret = "secret"

[defaults]
rust_log = "hopp_core=info"

# Named participant profiles, reused across scenarios
[participants.streamer]
name = "Costantinos"
#camera_name = ""
camera_name = "MacBook Pro Camera"
screenshare = false

[participants.viewer]
name = "Iason"
camera_name = ""
screenshare = false

# Named scenarios, each lists which participants to spawn
[scenarios.solo]
description = "Single participant with camera + screenshare"
participants = ["streamer"]

[scenarios.pair]
description = "Two participants, one sharing, one viewing"
participants = ["streamer", "viewer"]

[scenarios.solo-minimal]
description = "Single participant, no camera, no screenshare"
participants = ["viewer"]
